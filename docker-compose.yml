services:
  Expensify.api:
    image: ${DOCKER_REGISTRY-}expensifyapi
    container_name: Expensify.Api
    build:
      context: .
      dockerfile: src/API/Expensify.Api/Dockerfile
    depends_on:
      Expensify.database:
        condition: service_healthy
      Expensify.redis:
        condition: service_healthy
    environment:
       ASPNETCORE_ENVIRONMENT: Development
       ASPNETCORE_HTTP_PORTS: "8080"
    ports:
      - 5000:8080

  Expensify.database:
    image: postgres:17
    container_name: Expensify.Database
    environment:
      - POSTGRES_DB=Expensify
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    volumes:
      - expensify-db-data:/var/lib/postgresql/data
    ports:
      - 5432:5432
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  Expensify.redis:
    image: redis:latest
    container_name: Expensify.Redis
    restart: always
    ports:
      - 6379:6379
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  Expensify.aspire-dashboard:
    image: mcr.microsoft.com/dotnet/aspire-dashboard:latest
    container_name: Expensify.AspireDashboard
    environment:
      - ASPIRE_DASHBOARD_UNSECURED_ALLOW_ANONYMOUS=true
    ports:
      - 18888:18888
      - 4317:18889

volumes:
  expensify-db-data:
